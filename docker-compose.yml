version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: careercopilot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  backend:
    build: ./server
    container_name: careercopilot-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres

  frontend:
    build: ./client
    container_name: careercopilot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend